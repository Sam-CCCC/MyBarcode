
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarcodePro - Professional Label System</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary-color: #1a73e8; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary-color); text-align: center; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f1f3f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 13px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        
        .btn-group { grid-column: span 2; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        button { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-gen { background: var(--primary-color); }
        .btn-excel { background: #34a853; }
        .btn-config { background: #f4b400; } /* 橙色用于配置操作 */
        .btn-print { background: #5f6368; }
        button:hover { opacity: 0.8; }

        #previewArea { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .label-item { border: 1px solid #eee; padding: 15px; background: white; display: flex; flex-direction: column; align-items: center; }
        
        @media print { .controls, h1, .btn-group { display: none; } .container { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <h1>BarcodePro</h1>

    <div class="controls">
        <div class="control-group">
            <label>标题内容:</label>
            <input type="text" id="inputText" placeholder="输入标题">
        </div>
        <div class="control-group">
            <label>条码/二维码数值:</label>
            <input type="text" id="barcodeValue" placeholder="输入数值">
        </div>
        <div class="control-group">
            <label>字体 (Font Family):</label>
            <select id="titleFont" onchange="saveSettings()">
                <option value="Arial">Arial</option>
                <option value="'Courier New', monospace">Monospace</option>
                <option value="Georgia, serif">Serif</option>
                <option value="Impact">Impact (Bold)</option>
            </select>
        </div>
        <div class="control-group">
            <label>字号 (px):</label>
            <input type="number" id="titleSize" value="16" onchange="saveSettings()">
        </div>
        <div class="control-group">
            <label>编码类型:</label>
            <select id="codeType" onchange="saveSettings()">
                <option value="CODE128">Barcode (128)</option>
                <option value="QR">QR Code</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn-gen" onclick="generateSingle()">生成单个</button>
            <button class="btn-excel" onclick="document.getElementById('excelInput').click()">导入 Excel</button>
            <button class="btn-config" onclick="exportConfig()">导出配置</button>
            <button class="btn-config" onclick="document.getElementById('configInput').click()">导入配置</button>
            <button class="btn-print" onclick="window.print()">打印标签</button>
        </div>
        
        <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none" onchange="handleExcel(this)">
        <input type="file" id="configInput" accept=".json" style="display:none" onchange="importConfig(this)">
    </div>

    <div id="previewArea"></div>
</div>

<script>
    // --- 设置管理逻辑 ---

    // 页面加载时恢复设置
    window.onload = function() {
        const saved = localStorage.getItem('barcodePro_settings');
        if (saved) {
            applySettings(JSON.parse(saved));
        }
    }

    function saveSettings() {
        const settings = {
            font: document.getElementById('titleFont').value,
            size: document.getElementById('titleSize').value,
            type: document.getElementById('codeType').value
        };
        localStorage.setItem('barcodePro_settings', JSON.stringify(settings));
    }

    function applySettings(settings) {
        document.getElementById('titleFont').value = settings.font || 'Arial';
        document.getElementById('titleSize').value = settings.size || '16';
        document.getElementById('codeType').value = settings.type || 'CODE128';
    }

    // 导出配置为 JSON 文件
    function exportConfig() {
        const settings = localStorage.getItem('barcodePro_settings');
        if (!settings) return alert("暂无保存的配置可导出");
        
        const blob = new Blob([settings], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `BarcodePro_Config_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    // 从 JSON 文件导入配置
    function importConfig(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const settings = JSON.parse(e.target.result);
                applySettings(settings);
                saveSettings();
                alert("配置导入成功！");
            } catch (err) {
                alert("无效的配置文件");
            }
        };
        reader.readAsText(file);
    }

    // --- 核心渲染逻辑 (保持不变) ---

    function generateSingle() {
        const title = document.getElementById('inputText').value;
        const value = document.getElementById('barcodeValue').value;
        if(!value) return alert("请输入数值");
        document.getElementById('previewArea').innerHTML = '';
        createLabel(title, value);
    }

    function handleExcel(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);
            document.getElementById('previewArea').innerHTML = '';
            jsonData.forEach(row => createLabel(row.Title || '', row.Value || ''));
        };
        reader.readAsArrayBuffer(file);
    }

    function createLabel(title, value) {
        const container = document.getElementById('previewArea');
        const wrapper = document.createElement('div');
        wrapper.className = 'label-item';

        const titleDiv = document.createElement('div');
        titleDiv.textContent = title;
        titleDiv.style.fontFamily = document.getElementById('titleFont').value;
        titleDiv.style.fontSize = document.getElementById('titleSize').value + 'px';
        titleDiv.style.marginBottom = "5px";
        wrapper.appendChild(titleDiv);

        const type = document.getElementById('codeType').value;
        if(type === 'QR') {
            const canvas = document.createElement('canvas');
            QRCode.toCanvas(canvas, value, { width: 120, margin: 2 });
            wrapper.appendChild(canvas);
        } else {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            JsBarcode(svg, value, { format: "CODE128", width: 2, height: 60, displayValue: true });
            wrapper.appendChild(svg);
        }
        container.appendChild(wrapper);
    }
</script>

</body>
</html>

</html>
