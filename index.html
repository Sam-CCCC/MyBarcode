
<!DOCTYPE html>
<html lang="en"> 
	<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBarcode - Label System</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <script src="./js/jsbarcode.js"></script>
    <script src="./js/qrcode.js"></script>
    <script src="./js/xlsx.js"></script>
    <script src="./js/bwipjs.js"></script>
    <script src="./js/html2canvas.js"></script>

 <style>
        :root { --primary: #007bff; --success: #28a745; --export: #6f42c1; --bg: #f4f7f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .config-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .section-title { font-size: 14px; font-weight: bold; color: var(--primary); margin: 15px 0 10px; border-left: 4px solid var(--primary); padding-left: 8px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        textarea { flex: 1; height: 70px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
        
        .setting-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #666; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; color: white; transition: 0.2s; min-width: 140px; }
        .btn-gen { background: var(--primary); }
        .btn-print { background: var(--success); }
        .btn-export { background: var(--export); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #print-area { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 30px; }
        .label-card { background: white; border: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; align-items: center; width: fit-content; page-break-inside: avoid; border-radius: 4px; }
        .label-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: black; }
        canvas { max-width: 100%; height: auto; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #print-area { display: block; }
            .label-card { border: 1px solid #eee; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="config-panel no-print">
    <div class="header-flex">
        <div class="section-title" id="lang-data-entry" style="margin:0">1. 数据录入</div>
        <select id="langSelector" onchange="updateUI(this.value)" style="padding: 5px; border-radius: 4px;">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
        </select>
    </div>
    
    <div class="input-row">
        <textarea id="textInput" placeholder="请输入内容..."></textarea>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <label id="lang-excel-label">Excel 导入:</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls" style="width: 180px;">
        </div>
    </div>

    <div class="section-title" id="lang-core-settings">2. 核心设置</div>
    <div class="setting-grid">
        <div class="item">
            <label id="lang-protocol">条码协议</label>
            <select id="bcFormat">
                <option value="code128">Code 128</option>
                <option value="pdf417">PDF417</option>
                <option value="ean13">EAN-13</option>
                <option value="datamatrix">Data Matrix</option>
                <option value="code39">Code 39</option>
            </select>
        </div>
        <div class="item">
            <label id="lang-title-label">顶部标题</label>
            <input type="text" id="topTitle" value="Label Title">
        </div>
        <div class="item">
            <label id="lang-display-label">内容显示</label>
            <div style="font-size: 12px; display: flex; gap: 10px; padding-top: 5px;">
                <label><input type="checkbox" id="showBC" checked> <span id="lang-show-bc">条码</span></label>
                <label><input type="checkbox" id="showQR" checked> <span id="lang-show-qr">二维码</span></label>
            </div>
        </div>
    </div>

    <div class="section-title" id="lang-style-settings">3. 样式微调</div>
    <div class="setting-grid">
        <div class="item"><label id="lang-scale">条码细度(Scale)</label><input type="number" id="bcWidth" value="2" step="0.1"></div>
        <div class="item"><label id="lang-height">条码高度(mm)</label><input type="number" id="bcHeight" value="15"></div>
        <div class="item"><label id="lang-qr-size">二维码大小(px)</label><input type="number" id="qrSize" value="100"></div>
    </div>

    <div class="actions">
        <button class="btn-gen" onclick="processData()" id="lang-btn-gen">生成预览</button>
        <button class="btn-print" onclick="window.print()" id="lang-btn-print">直接打印</button>
        <button class="btn-export" onclick="exportAsImages()" id="lang-btn-export">保存为 PNG 图片</button>
    </div>
</div>

<div id="print-area">
    <div id="lang-empty-msg" style="color:#aaa; padding: 60px; text-align: center; width: 100%; border: 2px dashed #eee; border-radius: 10px;">
        生成预览将在此处显示
    </div>
</div>

<script>
    // 语言字典对象
    const i18n = {
        zh: {
            entry: "1. 数据录入", excel: "Excel 导入:", core: "2. 核心设置", proto: "条码协议", 
            title: "顶部标题", display: "内容显示", showBc: "条码", showQr: "二维码",
            style: "3. 样式微调", scale: "条码细度(Scale)", height: "条码高度(mm)", qrS: "二维码大小(px)",
            gen: "生成预览", print: "直接打印", export: "保存为 PNG 图片", empty: "生成预览将在此处显示",
            alertNoData: "请输入数据或上传Excel文件", alertExport: "准备开始下载，请允许多个文件下载。", alertPreview: "请先生成预览内容"
        },
        en: {
            entry: "1. Data Entry", excel: "Excel Import:", core: "2. Core Settings", proto: "Protocol", 
            title: "Top Title", display: "Visibility", showBc: "Barcode", showQr: "QR Code",
            style: "3. Style Tuning", scale: "BC Scale", height: "BC Height(mm)", qrS: "QR Size(px)",
            gen: "Generate", print: "Print", export: "Save as PNG", empty: "Preview will appear here",
            alertNoData: "Please enter data or upload Excel", alertExport: "Starting download, please allow multiple files.", alertPreview: "Please generate preview first"
        },
        ja: {
            entry: "1. データ入力", excel: "Excel 導入:", core: "2. 基本設定", proto: "バーコード規格", 
            title: "タイトル", display: "表示設定", showBc: "バーコード", showQr: "QRコード",
            style: "3. スタイル調整", scale: "幅の係数", height: "高さ(mm)", qrS: "QRサイズ(px)",
            gen: "プレビュー生成", print: "印刷", export: "PNGとして保存", empty: "ここにプレビューが表示されます",
            alertNoData: "データ入力またはExcelをアップロードしてください", alertExport: "ダウンロードを開始します。複数ファイルの保存を許可してください。", alertPreview: "先にプレビューを生成してください"
        },
        ko: {
            entry: "1. 데이터 입력", excel: "Excel 가져오기:", core: "2. 기본 설정", proto: "바코드 규격", 
            title: "제목", display: "표시 설정", showBc: "바코드", showQr: "QR코드",
            style: "3. 스타일 조정", scale: "너비 계수", height: "높이(mm)", qrS: "QR크기(px)",
            gen: "미리보기 생성", print: "인쇄", export: "PNG로 저장", empty: "미리보기가 여기에 표시됩니다",
            alertNoData: "데이터를 입력하거나 Excel을 업로드하세요", alertExport: "다운로드를 시작합니다. 여러 파일 다운로드를 허용해주세요.", alertPreview: "먼저 미리보기를 생성하세요"
        },
        es: {
            entry: "1. Entrada de datos", excel: "Importar Excel:", core: "2. Configuración", proto: "Protocolo", 
            title: "Título superior", display: "Visibilidad", showBc: "Barras", showQr: "QR",
            style: "3. Ajustes de estilo", scale: "Escala BC", height: "Altura BC(mm)", qrS: "Tamaño QR(px)",
            gen: "Generar", print: "Imprimir", export: "Guardar PNG", empty: "La vista previa aparecerá aquí",
            alertNoData: "Ingrese datos o suba un archivo Excel", alertExport: "Iniciando descarga, permita múltiples archivos.", alertPreview: "Primero genere la vista previa"
        },
        fr: {
            entry: "1. Entrée de données", excel: "Import Excel:", core: "2. Paramètres", proto: "Protocole", 
            title: "Titre supérieur", display: "Visibilité", showBc: "Code-barres", showQr: "Code QR",
            style: "3. Réglages de style", scale: "Échelle BC", height: "Hauteur BC(mm)", qrS: "Taille QR(px)",
            gen: "Générer", print: "Imprimer", export: "Enregistrer PNG", empty: "L'aperçu apparaîtra ici",
            alertNoData: "Entrez des données ou téléchargez un Excel", alertExport: "Téléchargement en cours, autorisez les fichiers multiples.", alertPreview: "Générez d'abord l'aperçu"
        },
        de: {
            entry: "1. Dateneingabe", excel: "Excel-Import:", core: "2. Kern-Einstellungen", proto: "Protokoll", 
            title: "Oberer Titel", display: "Sichtbarkeit", showBc: "Barcode", showQr: "QR-Code",
            style: "3. Stilanpassung", scale: "BC-Skala", height: "BC-Höhe(mm)", qrS: "QR-Größe(px)",
            gen: "Vorschau", print: "Drucken", export: "Als PNG speichern", empty: "Vorschau wird hier angezeigt",
            alertNoData: "Daten eingeben oder Excel hochladen", alertExport: "Download startet, bitte Mehrfachentladungen erlauben.", alertPreview: "Zuerst Vorschau generieren"
        }
    };

    let currentLang = 'zh';

    function updateUI(lang) {
        currentLang = lang;
        const d = i18n[lang];
        document.getElementById('lang-data-entry').innerText = d.entry;
        document.getElementById('lang-excel-label').innerText = d.excel;
        document.getElementById('lang-core-settings').innerText = d.core;
        document.getElementById('lang-protocol').innerText = d.proto;
        document.getElementById('lang-title-label').innerText = d.title;
        document.getElementById('lang-display-label').innerText = d.display;
        document.getElementById('lang-show-bc').innerText = d.showBc;
        document.getElementById('lang-show-qr').innerText = d.showQr;
        document.getElementById('lang-style-settings').innerText = d.style;
        document.getElementById('lang-scale').innerText = d.scale;
        document.getElementById('lang-height').innerText = d.height;
        document.getElementById('lang-qr-size').innerText = d.qrS;
        document.getElementById('lang-btn-gen').innerText = d.gen;
        document.getElementById('lang-btn-print').innerText = d.print;
        document.getElementById('lang-btn-export').innerText = d.export;
        if(document.getElementById('lang-empty-msg')) document.getElementById('lang-empty-msg').innerText = d.empty;
    }

    // 初始化语言检测
    const browserLang = navigator.language.split('-')[0];
    const initialLang = i18n[browserLang] ? browserLang : 'en';
    document.getElementById('langSelector').value = initialLang;
    updateUI(initialLang);

    // --- 以下为 6.0 核心逻辑 (未改动) ---

    async function processData() {
        const file = document.getElementById('excelFile').files[0];
        let list = [];
        if (file) {
            const data = await file.arrayBuffer();
            const wb = XLSX.read(data);
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
            list = json.map(r => r[0]).filter(c => c);
        } else {
            list = document.getElementById('textInput').value.split('\n').map(s => s.trim()).filter(s => s);
        }
        if (list.length === 0) return alert(i18n[currentLang].alertNoData);
        render(list);
    }

    function render(dataList) {
        const container = document.getElementById('print-area');
        container.innerHTML = "";
        const fmt = document.getElementById('bcFormat').value;
        const title = document.getElementById('topTitle').value;
        const showQR = document.getElementById('showQR').checked;
        const showBC = document.getElementById('showBC').checked;
        const bcW = parseFloat(document.getElementById('bcWidth').value);
        const bcH = parseInt(document.getElementById('bcHeight').value);
        const qrS = parseInt(document.getElementById('qrSize').value);

        dataList.forEach((val, i) => {
            const card = document.createElement('div');
            card.className = 'label-card';
            card.id = `card_${i}`;
            if(title) card.innerHTML += `<div class="label-title">${title}</div>`;
            if(showBC) {
                const bcCanvas = document.createElement('canvas');
                bcCanvas.id = `bc_${i}`;
                card.appendChild(bcCanvas);
            }
            if(showQR) {
                const qrDiv = document.createElement('div');
                qrDiv.id = `qr_${i}`;
                qrDiv.style.marginTop = "12px";
                card.appendChild(qrDiv);
            }
            container.appendChild(card);
            if(showBC) {
                try {
                    bwipjs.toCanvas(`bc_${i}`, { bcid: fmt, text: val.toString(), scale: bcW, height: bcH, includetext: true, textxalign: 'center'});
                } catch (e) { 
                    document.getElementById(`bc_${i}`).outerHTML = `<p style="color:red; font-size:10px;">Format Error</p>`;
                }
            }
            if(showQR) {
                new QRCode(document.getElementById(`qr_${i}`), { text: val.toString(), width: qrS, height: qrS, correctLevel: QRCode.CorrectLevel.M });
            }
        });
    }

    async function exportAsImages() {
        const cards = document.querySelectorAll('.label-card');
        if(cards.length === 0) return alert(i18n[currentLang].alertPreview);
        alert(i18n[currentLang].alertExport);
        for (let i = 0; i < cards.length; i++) {
            const canvas = await html2canvas(cards[i], { scale: 2, backgroundColor: null, useCORS: true });
            const link = document.createElement('a');
            link.download = `label_${i+1}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            await new Promise(r => setTimeout(r, 200));
        }
    }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker 注册成功:', reg.scope))
        .catch(err => console.log('Service Worker 注册失败:', err));
    });
  }
</script>
</body>

</html>
